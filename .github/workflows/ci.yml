name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore quantum-drive.csproj -p:Platform=x64

      - name: Build
        run: >
          dotnet build quantum-drive.csproj
          -c Release
          -p:Platform=x64
          -p:GenerateAppxPackageOnBuild=false
          -p:AppxAutoIncrementPackageRevision=false
          -p:PublishReadyToRun=false
          --no-restore

      - name: Test
        run: >
          dotnet test quantum-drive.Tests/quantum-drive.Tests.csproj
          -c Release
          -p:Platform=x64
          --verbosity normal
