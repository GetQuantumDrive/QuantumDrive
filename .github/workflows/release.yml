name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # Required to create GitHub releases

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install WiX toolset
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.Bal.wixext

      - name: Get version from tag
        id: version
        shell: pwsh
        run: |
          $semver = "${{ github.ref_name }}".TrimStart('v')
          $msi    = "$semver.0"
          "semver=$semver" | Out-File $env:GITHUB_OUTPUT -Append
          "msi=$msi"       | Out-File $env:GITHUB_OUTPUT -Append

      - name: Test
        run: >
          dotnet test quantum-drive.Tests/quantum-drive.Tests.csproj
          -c Release
          -p:Platform=x64
          --verbosity normal

      - name: Publish unpackaged x64
        shell: pwsh
        run: |
          dotnet publish quantum-drive.csproj `
            -c Release `
            -p:Platform=x64 `
            -p:BuildTarget=Unpackaged `
            -r win-x64 `
            --self-contained false `
            -o publish/x64

      - name: Build installer (x64 MSI)
        shell: pwsh
        run: |
          wix build installer/Product.wxs `
            -arch x64 `
            -d AppPublishDir="${{ github.workspace }}\publish\x64\" `
            -d ProductVersion="${{ steps.version.outputs.msi }}" `
            -o "installer/QuantumDrive-Setup-x64-${{ steps.version.outputs.semver }}.msi"

      - name: Build bootstrapper (x64 EXE)
        shell: pwsh
        run: |
          wix build installer/Bundle.wxs `
            -ext WixToolset.Bal.wixext `
            -arch x64 `
            -d BundleVersion="${{ steps.version.outputs.msi }}" `
            -d MsiPath="${{ github.workspace }}\installer\QuantumDrive-Setup-x64-${{ steps.version.outputs.semver }}.msi" `
            -o "installer/QuantumDrive-Setup-x64-${{ steps.version.outputs.semver }}.exe"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set MSIX version in manifest
        shell: pwsh
        run: |
          [xml]$m = Get-Content Package.appxmanifest
          $m.Package.Identity.Version = "${{ steps.version.outputs.msi }}"
          $m.Save("${{ github.workspace }}\Package.appxmanifest")

      - name: Build x64 MSIX (for Store upload)
        shell: pwsh
        run: |
          msbuild quantum-drive.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:AppxPackage=true `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=false `
            /p:AppxBundle=Never `
            /p:AppxAutoIncrementPackageRevision=false `
            "/p:AppxPackageDir=${{ github.workspace }}\AppPackages\x64\"

      - name: Build ARM64 MSIX (for Store upload)
        shell: pwsh
        run: |
          msbuild quantum-drive.csproj `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:RuntimeIdentifier=win-arm64 `
            /p:AppxPackage=true `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=false `
            /p:AppxBundle=Never `
            /p:AppxAutoIncrementPackageRevision=false `
            "/p:AppxPackageDir=${{ github.workspace }}\AppPackages\arm64\"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: QuantumDrive v${{ steps.version.outputs.semver }}
          draft: true
          generate_release_notes: true
          files: |
            installer/QuantumDrive-Setup-x64-${{ steps.version.outputs.semver }}.exe
            installer/QuantumDrive-Setup-x64-${{ steps.version.outputs.semver }}.msi
            AppPackages/x64/**/*.msix
            AppPackages/arm64/**/*.msix
